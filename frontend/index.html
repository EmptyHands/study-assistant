<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Assistant</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">&#x25C8;</div>
    <h2>Study Assistant</h2>
    <p>AI-Powered Learning</p>
  </div>
  <div class="sidebar-actions">
    <button class="btn-new-project" id="btnNewProject">
      <span class="plus">+</span> New Project
    </button>
  </div>
  <nav class="project-list" id="projectList">
    <div class="project-list-empty">No projects yet.<br>Click + to import one.</div>
  </nav>
  <div class="sidebar-footer">
    <span class="status-dot-live"></span>
    <span id="connectionStatus">Ready</span>
  </div>
</aside>

<main class="main-area">
  <header class="topbar">
    <h1 id="projectTitle">Welcome</h1>
    <div class="topbar-right">
      <span class="update-nudge" id="updateNudge" style="display:none;"></span>
      <button class="btn-update" id="btnUpdate" disabled>&#8635; Update</button>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab active" data-tab="content"><span class="tab-icon">&#x1F4D6;</span> Content</button>
    <button class="tab" data-tab="qa"><span class="tab-icon">&#x1F4AC;</span> Q&A</button>
    <button class="tab" data-tab="feynman"><span class="tab-icon">&#x1F9E0;</span> Feynman</button>
    <button class="tab" data-tab="logs"><span class="tab-icon">&#x1F4C8;</span> Log</button>
  </nav>

  <div class="content-area" id="contentArea">
    <div class="welcome-state">
      <div class="welcome-icon">&#x25C8;</div>
      <h2>Welcome to Study Assistant</h2>
      <p>Import a PDF, Git repository, or type a concept to begin.</p>
    </div>
  </div>
</main>

<div class="modal-overlay" id="importModal">
  <div class="modal-card">
    <div class="modal-header">
      <h3>Import Learning Project</h3>
      <button class="modal-close" id="btnModalClose">&times;</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" data-mtab="file">&#x1F4C1; File</button>
      <button class="modal-tab" data-mtab="git">&#x1F5C4; Git</button>
      <button class="modal-tab" data-mtab="concept">&#x1F4A1; Concept</button>
    </div>
    <div class="modal-panel active" id="panel-file">
      <div class="field"><label>Project Name <small>(optional)</small></label><input type="text" id="fileName" placeholder="Uses filename if empty"></div>
      <div class="drop-zone" id="dropZone"><div class="drop-icon">&#x1F4E4;</div><p>Click or drag file here</p><small>PDF, DOCX, TXT, images, code</small></div>
      <input type="file" id="fileInput" hidden>
    </div>
    <div class="modal-panel" id="panel-git">
      <div class="field"><label>Repository URL</label><input type="text" id="gitUrl" placeholder="https://github.com/user/repo.git"></div>
      <div class="field"><label>Project Name <small>(optional)</small></label><input type="text" id="gitName" placeholder="Auto-detected"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelGit">Cancel</button>
        <button class="btn-primary" id="btnImportGit">Import</button>
      </div>
    </div>
    <div class="modal-panel" id="panel-concept">
      <div class="field"><label>Topic / Concept</label><textarea id="conceptText" rows="4" placeholder="Describe a concept to learn..."></textarea></div>
      <div class="field"><label>Project Name <small>(optional)</small></label><input type="text" id="conceptName" placeholder="Auto-generated"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelConcept">Cancel</button>
        <button class="btn-primary" id="btnImportConcept">Import</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
